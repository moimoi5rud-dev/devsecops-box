name: DevSecOps Full Pipeline

# ==================== QUYỀN QUAN TRỌNG ====================
permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  security-scan-and-remediation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Quan trọng để git hoạt động tốt

      - name: Run Security Scans (SonarQube + Semgrep + SCA)
        run: |
          # (các lệnh scan của em ở đây)

      - name: Import reports to DefectDojo
        run: |
          # (các lệnh import của em ở đây)

      - name: Agentic AI Auto Remediation (Cline)
        run: |
          chmod +x auto_remediate.sh
          ./auto_remediate.sh

      - name: Create Pull Request with fixes (nếu có vá)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔧 Auto-fix: Security remediation by Agentic AI (Cline)"
          title: "🔧 Auto Remediation - Security Fixes by Cline"
          body: |
            Tự động vá các lỗ hổng High/Critical bởi **Agentic AI (Cline)** + MCP + DefectDojo.
            - Branch: `autofix-ai-remediation`
            - Được tạo tự động bởi DevSecOps-in-a-Box pipeline.
          branch: autofix-ai-remediation
          delete-branch: true
          labels: security, auto-fix, ai-remediation
